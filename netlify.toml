[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "zisi"

[functions.renderQuotePdf]
  external_node_modules = ["puppeteer-core", "@sparticuz/chromium"]
  included_files = [
    "node_modules/@sparticuz/chromium/**"
  ]

[[plugins]]
  package = "@netlify/plugin-nextjs"